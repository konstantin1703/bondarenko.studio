name: Quality checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-package-lock:
    name: Generate package-lock
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Generate package-lock.json
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit package-lock.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "Add package-lock.json"
          git push origin HEAD:${{ github.head_ref }}

  core-checks:
    name: Core frontend checks
    runs-on: ubuntu-latest
    needs: generate-package-lock
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run JS and CSS checks
        run: npm run check:core
