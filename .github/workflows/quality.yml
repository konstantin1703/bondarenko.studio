name: Quality checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  core-checks:
    name: Frontend quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run JS and CSS checks
        run: npm run check:core

      - name: Report full formatting and HTML checks
        run: npm run check
        continue-on-error: true
