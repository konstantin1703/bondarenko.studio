name: Apply temporary maintenance script

on:
  push:
    branches:
      - sprint-32-obfuscate-contacts
    paths:
      - scripts/apply-contact-obfuscation.js

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: sprint-32-obfuscate-contacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run maintenance script
        run: node scripts/apply-contact-obfuscation.js

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Apply contact obfuscation"
          git push origin sprint-32-obfuscate-contacts
