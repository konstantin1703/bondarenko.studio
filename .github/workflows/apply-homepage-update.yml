name: Apply homepage sprint update

on:
  workflow_dispatch:
  push:
    branches:
      - sprint-26-homepage-actual-cases
    paths:
      - .github/workflows/apply-homepage-update.yml
      - scripts/apply-sprint-26-homepage-update.js

permissions:
  contents: write

jobs:
  apply-homepage-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sprint branch
        uses: actions/checkout@v4
        with:
          ref: sprint-26-homepage-actual-cases

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply homepage update
        run: node scripts/apply-sprint-26-homepage-update.js

      - name: Commit homepage update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Apply sprint 26 homepage update"
          git push origin sprint-26-homepage-actual-cases
