name: Apply temporary mobile menu patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-mobile-menu-script.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: sprint-34-mobile-menu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run patch script
        run: node scripts/apply-mobile-menu.js

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Apply mobile menu patch"
          git push origin sprint-34-mobile-menu
