name: Apply CTA system update

on:
  workflow_dispatch:
  push:
    branches:
      - sprint-31-cta-system
    paths:
      - scripts/apply-cta-system-update.js
      - .github/workflows/apply-cta-system-update.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sprint branch
        uses: actions/checkout@v4
        with:
          ref: sprint-31-cta-system

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply CTA system update
        run: node scripts/apply-cta-system-update.js

      - name: Commit CTA system update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Apply CTA system update"
          git push origin sprint-31-cta-system
